{% extends "quiz_template.html" %}
{% block content %}
    <h2>How much stimulant do you want your pre-workout to have?</h2>
    <form method="POST" action="/quiz/stimulant">
        <span><input class="form-control" type="text" name="stimulant" placeholder="Stimulant (in mg)" aria-label="200mg"><p>mg</p></span>
        <button type="submit" class="btn btn-primary mt-3">Next</button>
    </form> 

{% endblock %}
