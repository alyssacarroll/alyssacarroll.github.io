{% extends "quiz_template.html" %}
{% block content %}
    <h2>How much caffeine do you want your pre-workout to have?</h2>
    <form method="POST" action="/quiz/caffeine">
        <span><input class="form-control" type="text" name="caffeine" placeholder="Caffeine (in mg)" aria-label="200mg"><p>mg</p></span>
        <button type="submit" class="btn btn-primary mt-3">Submit</button>
    </form> 

{% endblock %}
